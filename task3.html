<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 >Welcome to Pental Shop <span style="color:red">Lab3</span></h1>
    <p class="text">I Practice Creating Tables and Forms using HTML and CSS.this my 3rd lab task</p>

    <table>
        <tr class="head">
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>

        <tr class="row">
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>

        <tr class="row">
            <td>Notebooks</td>
            <td>50</td>
            <td>Low Stock1</td>
        </tr>

        <tr class="row">
            <td>Markers</td>
            <td>15</td>
            <td>In Stock</td>
        </tr>
    </table>

    <div class="contact">

        <h2>Contact Information</h2>

        <div class="group">
            <label>Name</label>
            <input type="text">
        </div>

        <div class="group">
            <label>Email</label>
            <input type="email">
        </div>

        <div class="group">
            <label>Message</label>
            <textarea></textarea>
        </div>

        <button>Submit</button>

    </div>

</body>
</html>
